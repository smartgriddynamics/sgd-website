<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin · SmartGrid Dynamics</title>
    <link rel="icon" href="image.png" type="image/svg+xml">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@300;400;500;600;700&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-auth-compat.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Space Grotesk', 'Archivo', sans-serif;
        }
        
        body {
            background: #0a0c12;
            background-image: radial-gradient(circle at 15% 30%, rgba(70, 90, 120, 0.15) 0%, transparent 40%),
                              radial-gradient(circle at 85% 70%, rgba(100, 130, 170, 0.1) 0%, transparent 45%);
            min-height: 100vh;
            color: #e0e8f5;
            padding: 2rem;
            position: relative;
        }

        .ambient-light {
            position: fixed;
            top: -50%;
            left: -20%;
            width: 140%;
            height: 140%;
            background: radial-gradient(circle at 30% 50%, rgba(100, 140, 200, 0.06) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        .admin-container {
            max-width: 1400px;
            margin: 0 auto;
            position: relative;
            z-index: 2;
        }

        h1 {
            font-size: 3.2rem;
            font-weight: 500;
            font-family: 'Archivo', sans-serif;
            margin-bottom: 2.5rem;
            border-left: 5px solid #b0c8ff;
            padding-left: 2rem;
            letter-spacing: -0.02em;
            background: linear-gradient(145deg, #f0f5ff, #b0c8ff);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 4px 8px #00000060);
            text-transform: uppercase;
        }

        .admin-grid {
            display: grid;
            grid-template-columns: 1fr 1.2fr;
            gap: 2.5rem;
            align-items: start;
        }

        @media (max-width: 1000px) {
            .admin-grid { grid-template-columns: 1fr; }
        }

        .glass-panel {
            background: rgba(8, 16, 28, 0.8);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(160, 184, 224, 0.15);
            border-radius: 60px;
            padding: 2.8rem;
            box-shadow: 0 30px 50px -20px black, inset 0 1px 0 rgba(255,255,255,0.05);
        }

        .glass-panel h2 {
            font-size: 2.2rem;
            font-weight: 500;
            margin-bottom: 2.2rem;
            border-bottom: 2px solid rgba(160, 184, 224, 0.2);
            padding-bottom: 1rem;
            font-family: 'Archivo', sans-serif;
            color: #d0e0ff;
        }

        .input-group {
            margin-bottom: 1.8rem;
        }

        .input-group label {
            display: block;
            margin-bottom: 0.5rem;
            opacity: 0.7;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #a0b8d0;
        }

        .input-group input, .input-group textarea {
            width: 100%;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid #2a405a;
            border-radius: 50px;
            padding: 1rem 1.8rem;
            color: #f0f5ff;
            font-size: 1rem;
        }

        .input-group input:focus, .input-group textarea:focus {
            border-color: #8098c0;
            outline: none;
        }

        .input-group textarea { border-radius: 30px; }

        .btn {
            background: rgba(32, 48, 72, 0.8);
            border: 1px solid #4a607a;
            border-radius: 60px;
            padding: 1rem 2.5rem;
            font-weight: 500;
            color: white;
            cursor: pointer;
            transition: 0.2s;
            font-size: 1.1rem;
            margin-right: 1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn:hover {
            background: #2a4060;
            border-color: #7088b0;
        }

        .btn-small {
            padding: 0.4rem 1.5rem;
            font-size: 0.9rem;
            background: rgba(32, 48, 72, 0.6);
            border: 1px solid #3a506a;
            border-radius: 40px;
            cursor: pointer;
            color: white;
        }

        .btn-small:hover { background: #2a4060; }

        .btn-danger { 
            background: rgba(100, 40, 40, 0.6);
            border-color: #8a4a4a;
        }
        .btn-danger:hover { background: #8a4a4a; }

        hr { 
            border: 0.5px solid rgba(160, 184, 224, 0.1); 
            margin: 2.5rem 0; 
        }

        .stats-editor {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1.2rem;
            margin-bottom: 2.2rem;
        }

        .stat-field {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 40px;
            padding: 1rem 1.5rem;
            border: 1px solid #1a2a3a;
        }

        .stat-field label { 
            font-size: 0.8rem; 
            opacity: 0.6;
            display: block;
            margin-bottom: 0.3rem;
            text-transform: uppercase;
        }

        .stat-field input {
            background: transparent;
            border: none;
            color: #d0e0ff;
            font-size: 1.4rem;
            font-weight: 500;
            width: 100%;
        }

        .stat-field input:focus { outline: none; }

        .project-item {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 50px;
            padding: 1.2rem 2rem;
            margin-bottom: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            border: 1px solid #1a2a3a;
        }

        .project-item:hover { border-color: #3a506a; }

        .project-actions button {
            background: none;
            border: none;
            color: #8098c0;
            margin-left: 1rem;
            cursor: pointer;
            font-size: 1.2rem;
        }

        .project-actions button:hover { color: #d0e0ff; }

        .edit-project-form {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 50px;
            padding: 2rem;
            margin-top: 1rem;
            display: none;
            border: 1px solid #2a405a;
        }

        .edit-project-form.active { display: block; }

        .edit-project-form input,
        .edit-project-form textarea {
            width: 100%;
            margin-bottom: 1rem;
            padding: 0.8rem 1.5rem;
            border-radius: 40px;
            border: 1px solid #2a405a;
            background: rgba(0, 0, 0, 0.3);
            color: white;
        }

        .inquiry-tabs {
            display: flex;
            gap: 1rem;
            margin-bottom: 2.5rem;
            flex-wrap: wrap;
        }

        .tab-btn {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid #2a405a;
            border-radius: 40px;
            padding: 0.6rem 2rem;
            cursor: pointer;
            color: #a0b8d0;
            font-size: 1rem;
            transition: 0.2s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .tab-btn.active {
            background: #1f3045;
            border-color: #8098c0;
            color: white;
        }

        .inquiry-card {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 50px;
            padding: 2rem;
            margin-bottom: 2rem;
            border-left: 5px solid #8098c0;
            position: relative;
            border: 1px solid #1a2a3a;
        }

        .inquiry-card.trash { 
            border-left-color: #8a6a6a; 
            opacity: 0.7;
        }

        .inquiry-name {
            font-size: 1.8rem;
            font-weight: 500;
            margin-bottom: 0.5rem;
            background: linear-gradient(145deg, #ffffff, #b0c8f0);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .inquiry-meta { 
            opacity: 0.7; 
            margin: 0.8rem 0;
            color: #a0b8d0;
        }

        .inquiry-actions {
            position: absolute;
            top: 1.8rem;
            right: 1.8rem;
            display: flex;
            gap: 0.8rem;
        }

        .inquiry-actions button {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid #2a405a;
            border-radius: 30px;
            padding: 0.4rem 1.2rem;
            color: #d0e0ff;
            cursor: pointer;
            font-size: 0.9rem;
        }

        .inquiry-actions button:hover { background: #1f3045; }

        .login-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(20px);
            z-index: 3000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-panel {
            background: rgba(8, 16, 28, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid #2a405a;
            border-radius: 80px;
            padding: 3.5rem;
            width: 450px;
            max-width: 90%;
        }

        .login-panel h2 {
            font-size: 2.5rem;
            margin-bottom: 2.5rem;
            border-left: 5px solid #b0c8ff;
            padding-left: 1.5rem;
        }

        .login-panel input {
            width: 100%;
            padding: 1.2rem 2rem;
            margin-bottom: 1.8rem;
            border-radius: 60px;
            border: 1px solid #2a405a;
            background: rgba(0, 0, 0, 0.3);
            color: white;
            font-size: 1rem;
        }

        .login-error {
            color: #ff9f9f;
            margin-bottom: 1.5rem;
            text-align: center;
        }

        .admin-content {
            display: none;
        }

        .empty-state {
            text-align: center;
            padding: 3rem;
            opacity: 0.5;
            border: 2px dashed #1a2a3a;
            border-radius: 50px;
            font-size: 1.1rem;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <div class="ambient-light"></div>

    <div id="loginOverlay" class="login-overlay">
        <div class="login-panel">
            <h2>ADMIN ACCESS</h2>
            <input type="email" id="emailInput" placeholder="EMAIL" value="admin@smartgrid.com">
            <input type="password" id="passwordInput" placeholder="PASSWORD" onkeypress="if(event.key==='Enter') login()">
            <button class="btn" onclick="login()" style="width:100%;">AUTHENTICATE</button>
            <div id="loginError" class="login-error"></div>
        </div>
    </div>

    <div id="adminContent" class="admin-content">
        <div class="admin-container">
            <h1>⚙️ ADMIN · SMARTGRID DYNAMICS</h1>
            <div class="admin-grid">
                <div class="glass-panel">
                    <h2><i class="fas fa-chart-line"></i> COMPANY STATS</h2>
                    <div class="stats-editor" id="statsEditor">
                        <div class="stat-field"><label>PROJECTS</label><input type="number" id="statProjects" value="0"></div>
                        <div class="stat-field"><label>COUNTRIES</label><input type="number" id="statCountries" value="0"></div>
                        <div class="stat-field"><label>PARTNERS</label><input type="number" id="statPartners" value="0"></div>
                        <div class="stat-field"><label>PATENTS</label><input type="number" id="statPatents" value="0"></div>
                    </div>
                    
                    <div class="input-group">
                        <label>TAGLINE</label>
                        <input type="text" id="companyTagline" value="">
                    </div>
                    
                    <h3 style="margin:2rem 0 1.5rem;">FOUNDER</h3>
                    <div class="input-group"><label>NAME</label><input type="text" id="founderName" value=""></div>
                    <div class="input-group"><label>BIO</label><textarea id="founderBio" rows="2"></textarea></div>
                    
                    <h3 style="margin:2rem 0 1.5rem;">INNOVATION</h3>
                    <div class="input-group"><label>TITLE</label><input type="text" id="innovationTitle" value=""></div>
                    <div class="input-group"><label>DESCRIPTION</label><textarea id="innovationDesc" rows="2"></textarea></div>
                    
                    <h3 style="margin:2rem 0 1.5rem;">GLOBAL</h3>
                    <div class="input-group"><label>TITLE</label><input type="text" id="globalTitle" value=""></div>
                    <div class="input-group"><label>DESCRIPTION</label><textarea id="globalDesc" rows="2"></textarea></div>
                    
                    <button class="btn" id="updateStatsBtn"><i class="fas fa-save"></i> UPDATE STATS</button>
                    <hr>
                    
                    <h2>➕ ADD PROJECT</h2>
                    <div class="input-group"><label>PROJECT NAME</label><input type="text" id="projName"></div>
                    <div class="input-group"><label>PROJECT LINK</label><input type="url" id="projLink" value="https://"></div>
                    <div class="input-group"><label>DESCRIPTION</label><textarea id="projDesc" rows="2"></textarea></div>
                    <button class="btn" id="addProjectBtn">PUBLISH PROJECT</button>
                    <hr>
                    
                    <h2>📋 MANAGE PROJECTS</h2>
                    <div id="projectListAdmin"></div>
                    
                    <hr>
                    <button class="btn btn-danger" onclick="logout()"><i class="fas fa-sign-out-alt"></i> LOGOUT</button>
                </div>
                
                <div class="glass-panel" style="max-height: 80vh; overflow-y: auto;">
                    <h2><i class="fas fa-inbox"></i> CONNECTION REQUESTS</h2>
                    
                    <div class="inquiry-tabs">
                        <button class="tab-btn active" id="tabUnread" onclick="filterInquiries('new')">UNREAD</button>
                        <button class="tab-btn" id="tabRead" onclick="filterInquiries('read')">READ</button>
                        <button class="tab-btn" id="tabTrash" onclick="filterInquiries('trash')">TRASH</button>
                    </div>
                    
                    <div id="inquiriesContainer"><div class="empty-state">— no requests —</div></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDPL-hNhqjUoGgx-amUGMU2ExteEAUT3RE",
            authDomain: "sgd-web-375c2.firebaseapp.com",
            projectId: "sgd-web-375c2",
            storageBucket: "sgd-web-375c2.firebasestorage.app",
            messagingSenderId: "468947653551",
            appId: "1:468947653551:web:b3999d9ff9fe70fd7e555a"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        function login() {
            const email = document.getElementById('emailInput').value.trim();
            const password = document.getElementById('passwordInput').value;
            
            if (!email || !password) {
                document.getElementById('loginError').innerText = 'ENTER CREDENTIALS';
                return;
            }
            
            auth.signInWithEmailAndPassword(email, password)
                .then(() => {
                    document.getElementById('loginOverlay').style.display = 'none';
                    document.getElementById('adminContent').style.display = 'block';
                    loadStatsIntoForm();
                    renderProjects();
                    filterInquiries('new');
                })
                .catch((error) => {
                    let message = 'AUTH FAILED';
                    if (error.code === 'auth/user-not-found') message = 'USER NOT FOUND';
                    else if (error.code === 'auth/wrong-password') message = 'INVALID PASSWORD';
                    document.getElementById('loginError').innerText = message;
                });
        }

        function logout() {
            auth.signOut().then(() => {
                document.getElementById('loginOverlay').style.display = 'flex';
                document.getElementById('adminContent').style.display = 'none';
                document.getElementById('passwordInput').value = '';
            });
        }

        auth.onAuthStateChanged((user) => {
            if (user) {
                document.getElementById('loginOverlay').style.display = 'none';
                document.getElementById('adminContent').style.display = 'block';
                loadStatsIntoForm();
                renderProjects();
                filterInquiries('new');
            }
        });

        function loadStatsIntoForm() {
            db.collection('companyStats').doc('main').get().then((doc) => {
                if(doc.exists) {
                    const d = doc.data();
                    document.getElementById('statProjects').value = d.projects || 0;
                    document.getElementById('statCountries').value = d.countries || 0;
                    document.getElementById('statPartners').value = d.partners || 0;
                    document.getElementById('statPatents').value = d.patents || 0;
                    document.getElementById('companyTagline').value = d.tagline || '';
                    document.getElementById('founderName').value = d.founderName || '';
                    document.getElementById('founderBio').value = d.founderBio || '';
                    document.getElementById('innovationTitle').value = d.innovationTitle || '';
                    document.getElementById('innovationDesc').value = d.innovationDesc || '';
                    document.getElementById('globalTitle').value = d.globalTitle || '';
                    document.getElementById('globalDesc').value = d.globalDesc || '';
                }
            }).catch(()=>{});
        }

        document.getElementById('updateStatsBtn').addEventListener('click', async ()=>{
            const data = {
                projects: parseInt(document.getElementById('statProjects').value) || 0,
                countries: parseInt(document.getElementById('statCountries').value) || 0,
                partners: parseInt(document.getElementById('statPartners').value) || 0,
                patents: parseInt(document.getElementById('statPatents').value) || 0,
                tagline: document.getElementById('companyTagline').value,
                founderName: document.getElementById('founderName').value,
                founderBio: document.getElementById('founderBio').value,
                innovationTitle: document.getElementById('innovationTitle').value,
                innovationDesc: document.getElementById('innovationDesc').value,
                globalTitle: document.getElementById('globalTitle').value,
                globalDesc: document.getElementById('globalDesc').value
            };
            await db.collection('companyStats').doc('main').set(data);
            alert('STATS UPDATED');
        });

        document.getElementById('addProjectBtn').addEventListener('click', async ()=>{
            const name = document.getElementById('projName').value.trim();
            const link = document.getElementById('projLink').value.trim();
            const desc = document.getElementById('projDesc').value.trim();
            if(!name || !link) { alert('NAME AND LINK REQUIRED'); return; }
            await db.collection('projects').add({
                name, link, description: desc,
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            });
            document.getElementById('projName').value = '';
            document.getElementById('projLink').value = 'https://';
            document.getElementById('projDesc').value = '';
            updateProjectsStat();
        });

        async function updateProjectsStat() {
            const snapshot = await db.collection('projects').get();
            const count = snapshot.size;
            await db.collection('companyStats').doc('main').update({ projects: count });
            document.getElementById('statProjects').value = count;
        }

        function renderProjects() {
            db.collection('projects').orderBy('createdAt','desc').onSnapshot((snap)=>{
                let html = '';
                if (snap.empty) {
                    html = '<div class="empty-state">— no projects —</div>';
                } else {
                    snap.forEach(doc => {
                        let p = doc.data();
                        let id = doc.id;
                        html += `
                            <div class="project-item" id="project-${id}">
                                <span><strong>${escapeHtml(p.name)}</strong><br><small style="opacity:0.6;">${escapeHtml(p.link ? p.link.substring(0,40) : '')}</small></span>
                                <div class="project-actions">
                                    <button onclick="editProject('${id}')"><i class="fas fa-edit"></i></button>
                                    <button onclick="deleteProject('${id}')"><i class="fas fa-trash"></i></button>
                                </div>
                                <div class="edit-project-form" id="edit-form-${id}">
                                    <input type="text" id="edit-name-${id}" value="${escapeHtml(p.name)}" placeholder="NAME">
                                    <input type="url" id="edit-link-${id}" value="${escapeHtml(p.link)}" placeholder="LINK">
                                    <textarea id="edit-desc-${id}" placeholder="DESCRIPTION">${escapeHtml(p.description||'')}</textarea>
                                    <button class="btn-small" onclick="saveEdit('${id}')">SAVE</button>
                                    <button class="btn-small" onclick="cancelEdit('${id}')">CANCEL</button>
                                </div>
                            </div>
                        `;
                    });
                }
                document.getElementById('projectListAdmin').innerHTML = html;
                updateProjectsStat();
            });
        }

        window.editProject = function(id) {
            document.getElementById(`edit-form-${id}`).classList.add('active');
        };
        window.cancelEdit = function(id) {
            document.getElementById(`edit-form-${id}`).classList.remove('active');
        };
        window.saveEdit = async function(id) {
            const name = document.getElementById(`edit-name-${id}`).value;
            const link = document.getElementById(`edit-link-${id}`).value;
            const desc = document.getElementById(`edit-desc-${id}`).value;
            await db.collection('projects').doc(id).update({ name, link, description: desc });
            document.getElementById(`edit-form-${id}`).classList.remove('active');
        };
        window.deleteProject = async function(id) {
            if(confirm('DELETE PROJECT?')) {
                await db.collection('projects').doc(id).delete();
                updateProjectsStat();
            }
        };

        let currentFilter = 'new';

        window.filterInquiries = function(status) {
            currentFilter = status;
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            if(status === 'new') document.getElementById('tabUnread').classList.add('active');
            else if(status === 'read') document.getElementById('tabRead').classList.add('active');
            else if(status === 'trash') document.getElementById('tabTrash').classList.add('active');
            loadInquiries(status);
        };

        function loadInquiries(status) {
            db.collection('inquiries').orderBy('timestamp', 'desc').get().then((snap) => {
                let html = '';
                if (snap.empty) {
                    html = '<div class="empty-state">— no requests —</div>';
                } else {
                    snap.forEach(doc => {
                        let d = doc.data();
                        let docStatus = d.status || 'new';
                        if(status !== docStatus) return;
                        
                        let ts = d.timestamp ? new Date(d.timestamp.seconds*1000).toLocaleString() : 'recent';
                        html += `
                            <div class="inquiry-card ${status === 'trash' ? 'trash' : ''}">
                                <div class="inquiry-name">${escapeHtml(d.userName||'')}</div>
                                <div class="inquiry-meta">📧 ${escapeHtml(d.email||'')}  ·  📍 ${escapeHtml(d.location||'')}  ·  📞 ${escapeHtml(d.phone||'')}</div>
                                <div><strong style="color:#8098c0;">PROJECT:</strong> ${escapeHtml(d.projectName||'')}</div>
                                <div><strong style="color:#8098c0;">SERVICE:</strong> ${escapeHtml(d.service||'')}</div>
                                <div style="margin:1.2rem 0; background:rgba(0,0,0,0.2); padding:1.2rem; border-radius:30px;">💬 ${escapeHtml(d.comments||'')}</div>
                                <div style="font-size:0.8rem; opacity:0.4;">${ts}</div>
                                <div class="inquiry-actions">
                                    ${status !== 'trash' ? `<button onclick="markAs('${doc.id}', 'read')">READ</button>` : ''}
                                    ${status !== 'trash' ? `<button onclick="markAs('${doc.id}', 'trash')">TRASH</button>` : ''}
                                    ${status === 'trash' ? `<button onclick="deleteInquiry('${doc.id}')">DELETE</button>` : ''}
                                    ${status === 'trash' ? `<button onclick="markAs('${doc.id}', 'new')">RESTORE</button>` : ''}
                                </div>
                            </div>
                        `;
                    });
                }
                if (html === '') html = '<div class="empty-state">— no requests —</div>';
                document.getElementById('inquiriesContainer').innerHTML = html;
            });
        }

        window.markAs = async function(id, status) {
            await db.collection('inquiries').doc(id).update({ status });
            loadInquiries(currentFilter);
        };

        window.deleteInquiry = async function(id) {
            if(confirm('PERMANENTLY DELETE?')) {
                await db.collection('inquiries').doc(id).delete();
                loadInquiries(currentFilter);
            }
        };

        function escapeHtml(t) { 
            if(!t) return ''; 
            return String(t).replace(/[&<>"]/g, function(m){ 
                if(m==='&') return '&amp;'; 
                if(m==='<') return '&lt;'; 
                if(m==='>') return '&gt;'; 
                if(m==='"') return '&quot;'; 
                return m;
            });
        }
    </script>
